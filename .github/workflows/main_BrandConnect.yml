name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Zip artifact
      run: zip -r release.zip . --exclude "*.git*"

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'BrandConnect'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: release.zip
