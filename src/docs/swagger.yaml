openapi: 3.0.0

info:
  title: Brand Connect API
  version: 1.0.0
  description: Backend API for influencer marketplace platform (Brand Connect)

servers:
  - url: http://localhost:3000

# =========================================================
# TAGS
# =========================================================

tags:
  - name: Auth
    description: Authentication & MFA endpoints

  - name: Users
    description: User management endpoints

  - name: Profiles
    description: Influencer & client profile management

  - name: Marketplace
    description: Influencer marketplace services

  - name: Stripe Payments
    description: Stripe checkout and payment processing

  - name: Chat
    description: Messaging and conversations

  - name: Admin
    description: Administrative endpoints (dashboard, reports)

  - name: Fulfillment
    description: Service delivery workflow

# =========================================================
# SECURITY
# =========================================================

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Payload varies by endpoint
          additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: ValidationError
        message:
          type: string
          example: "Missing required field: email"
        code:
          type: string
          example: ERR_MISSING_FIELD

    ValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
          example: 123
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20

    # -----------------------------
    # Domain-specific schemas
    # -----------------------------
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: Juan Perez
        role:
          type: string
          example: client
        email_verified:
          type: boolean
          example: false
        mfa_enabled:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2025-12-01T12:34:56Z"

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: "Account created. Please check your email to verify your account."

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: "Login successful"
        token:
          type: string
          nullable: true
        user:
          $ref: '#/components/schemas/User'
        mfaRequired:
          type: boolean
          example: false

    VerifyMFAResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    VerifyEmailResponse:
      type: object
      properties:
        verified:
          type: boolean
          example: true
        email:
          type: string
        name:
          type: string
        otpauth_url:
          type: string

    MFAQRResponse:
      type: object
      properties:
        otpauth_url:
          type: string

    CreatorProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        age:
          type: integer
          nullable: true
        gender:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        willing:
          type: array
          items:
            type: string
        socials:
          type: object
          properties:
            instagram:
              type: string
              nullable: true
            tiktok:
              type: string
              nullable: true
            youtube:
              type: string
              nullable: true
        stats:
          type: object
          properties:
            followers:
              type: integer
              nullable: true
            engagement:
              type: number
              nullable: true
        price:
          type: number
          nullable: true
        status:
          type: string
        trending:
          type: boolean

    MarketplaceService:
      type: object
      properties:
        service_id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        tag:
          type: string
        price:
          type: number
        status:
          type: string
        trending:
          type: boolean
        location:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true

    ServiceCreateRequest:
      type: object
      required:
        - user_id
        - influencer_name
      properties:
        user_id:
          type: integer
          example: 5
        influencer_name:
          type: string
          example: "Gaming TikTok Promotion"
        category:
          type: string
          example: gaming
        price:
          type: number
          example: 50

    CheckoutSessionResponse:
      type: object
      properties:
        message:
          type: string
        url:
          type: string
        sessionId:
          type: string
        orderId:
          type: integer

    OfferCheckoutRequest:
      type: object
      properties:
        conversation_id:
          type: integer
        amount_cop:
          type: number
        description:
          type: string
        duration_weeks:
          type: integer
        offer_message_id:
          type: integer

    PaymentOrder:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        service_id:
          type: integer
          nullable: true
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
        stripe_session_id:
          type: string
          nullable: true
        stripe_payment_intent_id:
          type: string
          nullable: true
        paid_at:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        creator_id:
          type: integer
        updated_at:
          type: string
          format: date-time
        other_name:
          type: string
          nullable: true
        other_avatar:
          type: string
          nullable: true
        other_id:
          type: integer
          nullable: true
        last_message:
          type: string
          nullable: true
        last_message_at:
          type: string
          format: date-time
          nullable: true
        unread_count:
          type: integer

    Message:
      type: object
      properties:
        id:
          type: integer
        conversation_id:
          type: integer
        sender_id:
          type: integer
        text:
          type: string
        is_offer:
          type: boolean
        offer_amount:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true

  responses:
    Success:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'

    Created:
      description: Resource created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              summary: Validation error example
              value:
                error: ValidationError
                message: "Missing required field: email"

    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict (resource already exists)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - BearerAuth: []

# =========================================================
# PATHS
# =========================================================

paths:

  # =========================================================
  # AUTH
  # =========================================================

  /api/auth/register:
    post:
      tags:
        - Auth

      summary: Register a new user with MFA setup

      security: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email
                - password
                - name

              properties:
                email:
                  type: string
                  example: test@email.com

                password:
                  type: string
                  example: 123456

                name:
                  type: string
                  example: Juan Perez

                role:
                  type: string
                  example: client
            examples:
              register:
                summary: Example register payload
                value:
                  email: newuser@example.com
                  password: strongpassword
                  name: María López
                  role: client

      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                message: "Account created. Please check your email to verify your account."

        "409":
          $ref: '#/components/responses/Conflict'

        "400":
          $ref: '#/components/responses/BadRequest'

  /api/auth/login:
    post:
      tags:
        - Auth

      summary: Login user

      security: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email
                - password

              properties:
                email:
                  type: string
                  example: test@email.com

                password:
                  type: string
                  example: 123456
            examples:
              login:
                summary: Example login payload
                value:
                  email: user@example.com
                  password: secret123

      responses:
        "200":
          description: Login response (either JWT returned or MFA required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  summary: Successful login (no MFA)
                  value:
                    message: "Login successful"
                    token: "eyJhbGci..."
                    user:
                      id: 12
                      email: user@example.com
                      name: Ana
                      role: client
                      email_verified: true
                      mfa_enabled: false
                    mfaRequired: false
                mfa_required:
                  summary: MFA required
                  value:
                    message: "MFA required"
                    user:
                      id: 12
                      email: user@example.com
                    mfaRequired: true

        "400":
          $ref: '#/components/responses/BadRequest'

        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auth/verify-mfa:
    post:
      tags:
        - Auth

      summary: Verify MFA code

      security: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email
                - token

              properties:
                email:
                  type: string
                  example: test@email.com

                token:
                  type: string
                  example: "123456"
            examples:
              mfa:
                summary: Verify MFA example
                value:
                  email: user@example.com
                  token: "123456"
      responses:
        "200":
          description: MFA verified and JWT returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyMFAResponse'
              example:
                success: true
                token: "eyJhbGci..."
                user:
                  id: 12
                  email: user@example.com
                  name: Ana
                  role: client

        "400":
          $ref: '#/components/responses/BadRequest'

  /api/auth/mfa/qr:
    post:
      tags:
        - Auth

      summary: Generate MFA QR code

      security: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email

              properties:
                email:
                  type: string
                  example: test@email.com
            examples:
              qr:
                summary: Example MFA QR request
                value:
                  email: user@example.com

      responses:
        "200":
          description: Returns otpauth_url for MFA setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAQRResponse'
              example:
                otpauth_url: "otpauth://totp/BrandConnect:user@example.com?secret=ABC123&issuer=BrandConnect"

        "400":
          $ref: '#/components/responses/BadRequest'

  # =========================================================
  # USERS
  # =========================================================

  /api/users:
    get:
      tags:
        - Users

      summary: Get all users

      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: 1
                  email: admin@example.com
                  name: Admin
                  role: admin
                  email_verified: true
                  mfa_enabled: false
                - id: 2
                  email: user@example.com
                  name: Ana
                  role: client
                  email_verified: true
                  mfa_enabled: true

        "500":
          $ref: '#/components/responses/InternalServerError'

  /api/users/{id}:
    get:
      tags:
        - Users

      summary: Get user by ID

      parameters:
        - name: id
          in: path
          required: true

          schema:
            type: string

      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 2
                email: user@example.com
                name: Ana
                role: client
                email_verified: true
                mfa_enabled: true

        "404":
          $ref: '#/components/responses/NotFound'

        "500":
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Users

      summary: Update user

      parameters:
        - name: id
          in: path
          required: true

          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                name:
                  type: string

                email:
                  type: string

      responses:
        "200":
          description: User updated

    delete:
      tags:
        - Users

      summary: Delete user

      parameters:
        - name: id
          in: path
          required: true

          schema:
            type: string

      responses:
        "200":
          description: User deleted

  # =========================================================
  # PROFILES
  # =========================================================

  /api/profiles/influencer:
    post:
      tags:
        - Profiles

      summary: Create influencer profile

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - user_id
                - niche

              properties:
                user_id:
                  type: string
                  example: "1"

                niche:
                  type: string
                  example: gaming

                bio:
                  type: string
                  example: Gaming content creator

      responses:
        "201":
          $ref: '#/components/responses/Created'

        "400":
          $ref: '#/components/responses/BadRequest'

  /api/profiles/client:
    post:
      tags:
        - Profiles

      summary: Create client profile

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - user_id

              properties:
                user_id:
                  type: string
                  example: "2"

                company_name:
                  type: string
                  example: Startup Inc

      responses:
        "201":
          $ref: '#/components/responses/Created'

        "400":
          $ref: '#/components/responses/BadRequest'

  /api/profiles/user/{user_id}:
    get:
      tags:
        - Profiles

      summary: Get profile by user ID

      parameters:
        - name: user_id
          in: path
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Profile found

  /api/profiles/influencer/{user_id}:
    put:
      tags:
        - Profiles

      summary: Update influencer profile

      parameters:
        - name: user_id
          in: path
          required: true

          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                niche:
                  type: string

                bio:
                  type: string

      responses:
        "200":
          description: Profile updated

  # =========================================================
  # MARKETPLACE
  # =========================================================

  /api/marketplace/service:
    post:
      tags:
        - Marketplace

      summary: Create influencer marketplace service

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - title
                - price

              properties:
                title:
                  type: string
                  example: Gaming TikTok Promotion

                description:
                  type: string
                  example: Funny gaming promotion

                category:
                  type: string
                  example: gaming

                price:
                  type: number
                  example: 50
            examples:
              create_service:
                summary: Example create service payload
                value:
                  user_id: 12
                  influencer_name: "María López"
                  category: travel
                  price: 100
                  status: available

      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  service:
                    $ref: '#/components/schemas/MarketplaceService'
              example:
                message: "Service created"
                service:
                  service_id: 101
                  user_id: 12
                  title: "María López"
                  tag: travel
                  price: 100
                  status: available
                  trending: false

        "400":
          $ref: '#/components/responses/BadRequest'

  /api/marketplace/services:
    get:
      tags:
        - Marketplace

      summary: Get all marketplace services

      responses:
        "200":
          description: List of marketplace services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MarketplaceService'
              example:
                - service_id: 101
                  user_id: 12
                  title: "María López"
                  tag: travel
                  price: 100
                  status: available
                  trending: false
                - service_id: 102
                  user_id: 15
                  title: "GamerX"
                  tag: gaming
                  price: 50
                  status: available
                  trending: true

  /api/marketplace/services/user/{user_id}:
    get:
      tags:
        - Marketplace

      summary: Get services by user

      parameters:
        - name: user_id
          in: path
          required: true

          schema:
            type: string

      responses:
        "200":
          description: User services found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MarketplaceService'
              example:
                - service_id: 101
                  user_id: 12
                  title: "María López"
                  tag: travel
                  price: 100
                  status: available

  /api/marketplace/service/status:
    put:
      tags:
        - Marketplace

      summary: Update marketplace service status

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - service_id
                - status

              properties:
                service_id:
                  type: string
                  example: "10"

                status:
                  type: string

                  enum:
                    - available
                    - unavailable
                    - paused

                  example: available

      responses:
        "200":
          description: Service status updated

  # =========================================================
  # STRIPE PAYMENTS
  # =========================================================



  /api/payments/status/{paymentId}:
    get:
      tags:
        - Stripe Payments

      summary: Get payment status by paymentId

      parameters:
        - name: paymentId
          in: path
          required: true

          schema:
            type: string
            example: "1"

      responses:
        "200":
          $ref: '#/components/responses/Success'

        "404":
          $ref: '#/components/responses/NotFound'

        "500":
          $ref: '#/components/responses/InternalServerError'

  /api/payments/create-checkout/{service_id}:
    post:
      tags:
        - Stripe Payments

      summary: Create Stripe checkout session (new route)

      parameters:
        - name: service_id
          in: path
          required: true

          schema:
            type: string
            example: "1"

      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
              example:
                message: "Checkout session created successfully"
                url: "https://checkout.stripe.com/pay/cs_test_123"
                sessionId: "cs_test_123"
                orderId: 456

        "400":
          $ref: '#/components/responses/BadRequest'

        "404":
          $ref: '#/components/responses/NotFound'

  /api/payments/checkout-offer:
    post:
      tags:
        - Stripe Payments

      summary: Create checkout for negotiated offer (chat)

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              offer:
                summary: Example offer checkout payload
                value:
                  conversation_id: 55
                  amount_cop: 250000
                  description: "Promoción en TikTok de 30s"
                  duration_weeks: 2
                  offer_message_id: 987

      responses:
        "200":
          description: Checkout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
              example:
                message: "Checkout de oferta creado"
                url: "https://checkout.stripe.com/pay/cs_test_offer"
                sessionId: "cs_test_offer"
                orderId: 789

  /api/payments/webhook:
    post:
      tags:
        - Stripe Payments

      summary: Stripe webhook endpoint

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

      responses:
        "200":
          description: Webhook processed

  # =========================================================
  # FULFILLMENT
  # =========================================================

  /api/fulfillment/{order_id}:
    get:
      tags:
        - Fulfillment

      summary: Get fulfillment by order

      parameters:
        - name: order_id
          in: path
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Fulfillment found

        "404":
          description: Fulfillment not found

  /api/fulfillment/accept:
    post:
      tags:
        - Fulfillment

      summary: Influencer accepts order

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - order_id

              properties:
                order_id:
                  type: string
                  example: "1"

      responses:
        "200":
          description: Order accepted

  /api/fulfillment/deliver:
    post:
      tags:
        - Fulfillment

      summary: Influencer delivers service

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - order_id
                - delivery_data

              properties:
                order_id:
                  type: string
                  example: "1"

                delivery_data:
                  type: object

                  example:
                    link: https://tiktok.com/video/123

                notes:
                  type: string
                  example: Campaign delivered successfully

      responses:
        "200":
          description: Service delivered

  /api/fulfillment/complete:
    post:
      tags:
        - Fulfillment

      summary: Client completes order

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - order_id

              properties:
                order_id:
                  type: string
                  example: "1"

      responses:
        "200":
          description: Order completed

  # =========================================================
  # AUTH - VERIFY EMAIL
  # =========================================================

  /api/auth/verify-email:
    get:
      tags:
        - Auth

      summary: Verify email with token from query

      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Email verified and MFA setup info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
              example:
                verified: true
